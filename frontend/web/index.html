<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nascinema">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NASCinema</title>
  <link rel="manifest" href="manifest.json">

  <!-- HLS playback (self-hosted so content blockers can't strip it) -->
  <script src="hls.min.js"></script>
  <script>
    window.nascinemaAttachHls = function (video, url) {
      // The Play tap on the detail screen grants the document transient user
      // activation (~5s). Our VOD playlist loads instantly, so this play() lands
      // inside that window and runs UNMUTED — no autoplay attr, no mute.
      var tryPlay = function () {
        var p = video.play();
        if (p) p.catch(function (e) { console.log('NASCinema play() blocked:', e); });
      };
      if (window.Hls && window.Hls.isSupported()) {
        var hls = new Hls();
        hls.on(window.Hls.Events.MANIFEST_PARSED, tryPlay);
        hls.on(window.Hls.Events.ERROR, function (evt, data) {
          console.log('NASCinema HLS error:', data.type, data.details, 'fatal=' + data.fatal);
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', tryPlay);
      } else {
        console.log('NASCinema: hls.js missing and no native HLS support');
        video.src = url;
      }
    };

    // Attach a WebVTT subtitle track and show it. The `default` attribute is
    // unreliable for dynamically-added tracks, so force mode after it loads.
    window.nascinemaSetSub = function (video, url) {
      window.nascinemaClearSub(video);
      var track = document.createElement('track');
      track.kind = 'subtitles';
      track.label = 'NASCinema';
      track.srclang = 'und';
      track.src = url;
      track.setAttribute('data-nasc', '1');
      video.appendChild(track);
      var enable = function () {
        for (var i = 0; i < video.textTracks.length; i++) {
          video.textTracks[i].mode =
            video.textTracks[i].label === 'NASCinema' ? 'showing' : 'disabled';
        }
        window.nascinemaApplyOffset(video);
      };
      track.addEventListener('load', enable);
      setTimeout(enable, 200);
    };
    window.nascinemaClearSub = function (video) {
      for (var i = 0; i < video.textTracks.length; i++) {
        video.textTracks[i].mode = 'disabled';
      }
      var ts = video.querySelectorAll('track[data-nasc]');
      for (var j = 0; j < ts.length; j++) { ts[j].parentNode.removeChild(ts[j]); }
    };

    // Per-file subtitle sync offset, applied live by shifting cue times.
    window._nascSubOffset = 0;
    window.nascinemaApplyOffset = function (video) {
      for (var i = 0; i < video.textTracks.length; i++) {
        var tt = video.textTracks[i];
        if (tt.label !== 'NASCinema' || !tt.cues) continue;
        for (var j = 0; j < tt.cues.length; j++) {
          var c = tt.cues[j];
          if (c._origStart === undefined) {
            c._origStart = c.startTime;
            c._origEnd = c.endTime;
          }
          var s = c._origStart + window._nascSubOffset;
          c.startTime = s < 0 ? 0 : s;
          c.endTime = c._origEnd + window._nascSubOffset;
        }
      }
    };
    window.nascinemaSetSubOffset = function (video, seconds) {
      window._nascSubOffset = seconds;
      window.nascinemaApplyOffset(video);
    };
  </script>
  <style>
    /* Subtitle appearance: clean type, subtle navy container, readable shadow. */
    video::cue {
      background-color: transparent;
      color: #ffffff;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      font-weight: 600;
      line-height: 1.35;
      text-shadow:
        -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
        0 2px 6px rgba(0, 0, 0, 0.9);
    }
  </style>
  <script>
    // Self-hosted app, rebuilt constantly: Flutter's PWA service worker just
    // serves stale caches (slow/stuck loads after each rebuild). Builds use
    // --pwa-strategy=none so none is registered; this unregisters any already
    // stuck in the browser so the user doesn't have to clear it by hand.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
