<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nascinema">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NASCinema</title>
  <link rel="manifest" href="manifest.json">

  <!-- HLS playback (self-hosted so content blockers can't strip it) -->
  <script src="hls.min.js"></script>
  <script>
    window.nascinemaAttachHls = function (video, url) {
      // The Play tap on the detail screen grants the document transient user
      // activation (~5s). Our VOD playlist loads instantly, so this play() lands
      // inside that window and runs UNMUTED — no autoplay attr, no mute.
      var tryPlay = function () {
        var p = video.play();
        if (p) p.catch(function (e) { console.log('NASCinema play() blocked:', e); });
      };
      if (window.Hls && window.Hls.isSupported()) {
        var hls = new Hls();
        hls.on(window.Hls.Events.MANIFEST_PARSED, tryPlay);
        hls.on(window.Hls.Events.ERROR, function (evt, data) {
          console.log('NASCinema HLS error:', data.type, data.details, 'fatal=' + data.fatal);
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', tryPlay);
      } else {
        console.log('NASCinema: hls.js missing and no native HLS support');
        video.src = url;
      }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
